<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420">
  <rect width="980" height="420" fill="#f7fafc"/>

  <text x="40" y="52" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1a202c">
    AI / ML / DL Relationship
  </text>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">
    Deep Learning is a subset of Machine Learning, and Machine Learning is a subset of AI.
  </text>

  <rect x="40" y="110" rx="24" ry="24" width="900" height="260" fill="#ebf8ff" stroke="#90cdf4" stroke-width="3"/>
  <text x="72" y="150" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#2b6cb0">Artificial Intelligence (AI)</text>
  <text x="72" y="178" font-family="Arial, sans-serif" font-size="15" fill="#2c5282">Goal: build systems that perform tasks requiring intelligence.</text>

  <rect x="130" y="185" rx="20" ry="20" width="760" height="165" fill="#e6fffa" stroke="#4fd1c5" stroke-width="3"/>
  <text x="158" y="220" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#2c7a7b">Machine Learning (ML)</text>
  <text x="158" y="246" font-family="Arial, sans-serif" font-size="15" fill="#285e61">Learns patterns from data (linear models, trees, SVM, neural nets, ...).</text>

  <rect x="245" y="255" rx="18" ry="18" width="530" height="82" fill="#fffaf0" stroke="#f6ad55" stroke-width="3"/>
  <text x="270" y="287" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#c05621">Deep Learning (DL)</text>
  <text x="270" y="312" font-family="Arial, sans-serif" font-size="15" fill="#9c4221">Multi-layer neural networks that learn hierarchical features end-to-end.</text>

  <line x1="800" y1="267" x2="890" y2="205" stroke="#718096" stroke-width="2"/>
  <text x="894" y="202" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">manual features</text>
  <text x="894" y="218" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">more common</text>

  <line x1="770" y1="305" x2="890" y2="320" stroke="#718096" stroke-width="2"/>
  <text x="894" y="318" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">automatic feature</text>
  <text x="894" y="334" font-family="Arial, sans-serif" font-size="13" fill="#4a5568">learning</text>
</svg>
