<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <rect width="980" height="460" fill="#f8fafc"/>
  <text x="40" y="52" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#1a202c">
    Training Loop
  </text>
  <text x="40" y="82" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">
    Forward -> Loss -> Backward -> Update -> Repeat
  </text>

  <circle cx="490" cy="245" r="145" fill="#edf2f7" stroke="#cbd5e0" stroke-width="2"/>

  <rect x="420" y="95" width="140" height="48" rx="12" fill="#bee3f8" stroke="#4299e1" stroke-width="2"/>
  <text x="446" y="126" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1a365d">Data</text>

  <rect x="700" y="195" width="180" height="48" rx="12" fill="#c6f6d5" stroke="#48bb78" stroke-width="2"/>
  <text x="735" y="226" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#22543d">Forward</text>

  <rect x="650" y="325" width="180" height="48" rx="12" fill="#fefcbf" stroke="#d69e2e" stroke-width="2"/>
  <text x="710" y="356" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#744210">Loss</text>

  <rect x="300" y="325" width="220" height="48" rx="12" fill="#fed7d7" stroke="#f56565" stroke-width="2"/>
  <text x="358" y="356" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#742a2a">Backward</text>

  <rect x="110" y="195" width="180" height="48" rx="12" fill="#e9d8fd" stroke="#9f7aea" stroke-width="2"/>
  <text x="162" y="226" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#44337a">Update</text>

  <line x1="555" y1="122" x2="700" y2="208" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="790" y1="243" x2="760" y2="324" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="650" y1="349" x2="520" y2="349" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="300" y1="349" x2="230" y2="243" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="200" y1="195" x2="420" y2="122" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="62" y="430" font-family="Arial, sans-serif" font-size="15" fill="#4a5568">
    Each iteration uses gradients to move parameters toward lower loss.
  </text>
</svg>
