<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="380" viewBox="0 0 1200 380">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="1200" height="380" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1a202c">外卖结算中心核心链路</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">从订单事件到付款和对账，结算系统处理的是一条完整资金链，而不是单点计算。</text>

  <rect x="40" y="150" rx="14" ry="14" width="150" height="72" fill="#bee3f8" stroke="#3182ce" stroke-width="2"/>
  <text x="70" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#1a365d">订单事件</text>
  <text x="60" y="206" font-family="Arial, sans-serif" font-size="14" fill="#1a365d">支付/完成/退款</text>

  <rect x="230" y="150" rx="14" ry="14" width="150" height="72" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="255" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#22543d">快照冻结</text>
  <text x="250" y="206" font-family="Arial, sans-serif" font-size="14" fill="#22543d">订单上下文</text>

  <rect x="420" y="150" rx="14" ry="14" width="150" height="72" fill="#faf089" stroke="#d69e2e" stroke-width="2"/>
  <text x="445" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#744210">规则计算</text>
  <text x="440" y="206" font-family="Arial, sans-serif" font-size="14" fill="#744210">分账与分摊</text>

  <rect x="610" y="150" rx="14" ry="14" width="150" height="72" fill="#fed7d7" stroke="#e53e3e" stroke-width="2"/>
  <text x="635" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#742a2a">账务记账</text>
  <text x="635" y="206" font-family="Arial, sans-serif" font-size="14" fill="#742a2a">分录与余额</text>

  <rect x="800" y="150" rx="14" ry="14" width="150" height="72" fill="#e9d8fd" stroke="#805ad5" stroke-width="2"/>
  <text x="827" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#44337a">周期清算</text>
  <text x="830" y="206" font-family="Arial, sans-serif" font-size="14" fill="#44337a">结算单生成</text>

  <rect x="990" y="150" rx="14" ry="14" width="150" height="72" fill="#fbd38d" stroke="#dd6b20" stroke-width="2"/>
  <text x="1020" y="182" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#7b341e">付款对账</text>
  <text x="1018" y="206" font-family="Arial, sans-serif" font-size="14" fill="#7b341e">出款与核对</text>

  <line x1="190" y1="186" x2="230" y2="186" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="380" y1="186" x2="420" y2="186" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="570" y1="186" x2="610" y2="186" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="760" y1="186" x2="800" y2="186" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="950" y1="186" x2="990" y2="186" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="170" y="270" rx="12" ry="12" width="860" height="64" fill="#edf2f7" stroke="#a0aec0" stroke-width="2"/>
  <text x="200" y="308" font-family="Arial, sans-serif" font-size="16" fill="#2d3748">
    核心原则：先记账，再清算，再出款；任何逆向交易都通过追加分录和对账闭环修正。
  </text>
</svg>
