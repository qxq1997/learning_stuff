<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500">
  <defs>
    <marker id="arrow4" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>
  <rect width="1200" height="500" fill="#f8fafc"/>
  <text x="40" y="48" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1a202c">消息乱序处理思路</text>
  <text x="40" y="78" font-family="Arial, sans-serif" font-size="16" fill="#4a5568">不是假设消息永远有序，而是设计系统在乱序情况下也能最终做对。</text>

  <line x1="210" y1="130" x2="210" y2="430" stroke="#a0aec0" stroke-width="3"/>
  <line x1="520" y1="130" x2="520" y2="430" stroke="#a0aec0" stroke-width="3"/>
  <line x1="860" y1="130" x2="860" y2="430" stroke="#a0aec0" stroke-width="3"/>

  <text x="120" y="114" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2d3748">上游事件源</text>
  <text x="448" y="114" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2d3748">结算消费端</text>
  <text x="780" y="114" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#2d3748">pending / 重试</text>

  <rect x="90" y="150" rx="10" ry="10" width="170" height="46" fill="#bee3f8" stroke="#3182ce" stroke-width="2"/>
  <text x="120" y="179" font-family="Arial, sans-serif" font-size="15" fill="#1a365d">退款事件 seq=3</text>

  <line x1="260" y1="173" x2="520" y2="173" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>

  <rect x="420" y="150" rx="10" ry="10" width="200" height="46" fill="#fed7d7" stroke="#e53e3e" stroke-width="2"/>
  <text x="450" y="179" font-family="Arial, sans-serif" font-size="15" fill="#742a2a">状态不满足，不能入账</text>

  <line x1="620" y1="173" x2="860" y2="173" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>
  <rect x="765" y="150" rx="10" ry="10" width="190" height="46" fill="#faf089" stroke="#d69e2e" stroke-width="2"/>
  <text x="788" y="179" font-family="Arial, sans-serif" font-size="15" fill="#744210">挂起：WAIT_PREVIOUS</text>

  <rect x="90" y="240" rx="10" ry="10" width="170" height="46" fill="#bee3f8" stroke="#3182ce" stroke-width="2"/>
  <text x="108" y="269" font-family="Arial, sans-serif" font-size="15" fill="#1a365d">支付成功 seq=1</text>
  <line x1="260" y1="263" x2="520" y2="263" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>
  <rect x="430" y="240" rx="10" ry="10" width="180" height="46" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="452" y="269" font-family="Arial, sans-serif" font-size="15" fill="#22543d">处理成功，状态=PAID</text>

  <rect x="90" y="330" rx="10" ry="10" width="170" height="46" fill="#bee3f8" stroke="#3182ce" stroke-width="2"/>
  <text x="108" y="359" font-family="Arial, sans-serif" font-size="15" fill="#1a365d">订单完成 seq=2</text>
  <line x1="260" y1="353" x2="520" y2="353" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>
  <rect x="420" y="330" rx="10" ry="10" width="200" height="46" fill="#c6f6d5" stroke="#38a169" stroke-width="2"/>
  <text x="440" y="359" font-family="Arial, sans-serif" font-size="15" fill="#22543d">处理成功，状态=FINISHED</text>

  <line x1="860" y1="196" x2="860" y2="330" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>
  <line x1="860" y1="353" x2="620" y2="353" stroke="#4a5568" stroke-width="3" marker-end="url(#arrow4)"/>
  <rect x="430" y="402" rx="12" ry="12" width="360" height="52" fill="#edf2f7" stroke="#a0aec0" stroke-width="2"/>
  <text x="455" y="435" font-family="Arial, sans-serif" font-size="15" fill="#2d3748">重新扫描 pending，退款 seq=3 现在满足前置条件，继续入账。</text>
</svg>
